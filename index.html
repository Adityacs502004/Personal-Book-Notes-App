<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book reviewer</title>
    <link rel="stylesheet" href="public/Styles/main.css">
</head>
<body>
    <div class="icon_heading">
        <div class="book_shelve_icon"></div>
        <div class="heading">
            <h1>My Book Reviews </h1>
            <div class="para">
                <p>Personal book reading, review and recap page</p>
            </div>
        </div>
        
        
    </div>
    
    <form  class="add_book" action="/add" method="post">
        <button class="add_book_btn" type="submit">
            <span class="plus">+</span>
            Add Book
        </button>
    </form>
    <div class="total_book">Total books : <%= total %></div>
    <div class="book_list">
        <h1>Reading list</h1>
    </div>
    
</body>
</html>
